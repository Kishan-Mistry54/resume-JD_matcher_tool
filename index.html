<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume-JD Matcher</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; color: #333; display: flex; justify-content: center; padding: 40px 20px; }
        .container { background: #fff; width: 100%; max-width: 1000px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; font-size: 28px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        
        .card { border: 2px dashed #cbd5e0; border-radius: 8px; padding: 20px; }
        .card h3 { margin-bottom: 15px; color: #4a5568; }
        
        .upload-btn { display: block; width: 100%; padding: 12px; background: #ebf8ff; color: #2b6cb0; border: 1px solid #90cdf4; border-radius: 6px; cursor: pointer; font-weight: bold; text-align: center; transition: 0.3s; }
        .upload-btn:hover { background: #bee3f8; }
        
        .file-name { display: block; margin-top: 10px; font-size: 14px; color: #718096; font-style: italic; }
        
        textarea { width: 100%; height: 150px; margin-top: 15px; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; resize: vertical; font-family: inherit; }
        textarea:focus { outline: none; border-color: #4299e1; }
        
        .analyze-btn { display: block; width: 100%; padding: 16px; background: #3182ce; color: #fff; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 30px; }
        .analyze-btn:hover { background: #2b6cb0; }
        .analyze-btn:disabled { background: #cbd5e0; cursor: not-allowed; }
        
        .results { display: none; }
        .score-box { text-align: center; padding: 20px; background: #f7fafc; border-radius: 8px; margin-bottom: 20px; }
        .score-num { font-size: 64px; font-weight: 700; }
        .high { color: #38a169; }
        .mid { color: #d69e2e; }
        .low { color: #e53e3e; }
        
        .skills-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .skill-section h3 { margin-bottom: 10px; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { padding: 6px 14px; border-radius: 20px; font-size: 14px; }
        .tag-green { background: #c6f6d5; color: #22543d; border: 1px solid #9ae6b4; }
        .tag-red { background: #fed7d7; color: #742a2a; border: 1px solid #feb2b2; }
        
        .explanation-box { background: #fffff0; border-left: 5px solid #d69e2e; padding: 15px 20px; border-radius: 4px; line-height: 1.6; color: #4a5568; }
        
        .error { color: #e53e3e; background: #fff5f5; padding: 15px; border-radius: 6px; margin-bottom: 20px; display: none; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3182ce; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Resume – Job Description Matcher</h1>
    
    <div id="error-box" class="error"></div>
    
    <div class="grid">
        <!-- Resume Section -->
        <div class="card">
            <h3>📋 Resume</h3>
            <label class="upload-btn">
                Choose PDF from device
                <input type="file" id="resumeFile" accept=".pdf" style="display: none;">
            </label>
            <span id="resumeFileName" class="file-name"></span>
            <textarea id="resumeText" placeholder="Or paste resume text here..."></textarea>
        </div>

        <!-- Job Description Section -->
        <div class="card">
            <h3>📝 Job Description</h3>
            <label class="upload-btn">
                Choose PDF from device
                <input type="file" id="jdFile" accept=".pdf" style="display: none;">
            </label>
            <span id="jdFileName" class="file-name"></span>
            <textarea id="jdText" placeholder="Or paste job description here..."></textarea>
        </div>
    </div>

    <button id="analyzeBtn" class="analyze-btn">Analyze Match</button>
    <div id="loader" class="loader"></div>

    <div id="results" class="results">
        <div class="score-box">
            <div id="scoreDisplay" class="score-num">0</div>
            <div style="font-size: 18px; color: #718096;">/ 100 Match Score</div>
        </div>

        <div class="skills-container">
            <div class="skill-section">
                <h3 style="color: #22543d;">✅ Matched Skills</h3>
                <div id="matchedTags" class="tags"></div>
            </div>
            <div class="skill-section">
                <h3 style="color: #742a2a;">❌ Missing Skills</h3>
                <div id="missingTags" class="tags"></div>
            </div>
        </div>

        <div class="explanation-box">
            <h3 style="margin-bottom: 10px; color: #744210;">📊 Explanation</h3>
            <p id="explanationText"></p>
        </div>
    </div>
</div>

<script>
    const resumeFileInput = document.getElementById('resumeFile');
    const jdFileInput = document.getElementById('jdFile');
    const resumeFileName = document.getElementById('resumeFileName');
    const jdFileName = document.getElementById('jdFileName');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const loader = document.getElementById('loader');
    const resultsDiv = document.getElementById('results');
    const errorBox = document.getElementById('error-box');

    // Update file name display when a file is selected
    resumeFileInput.addEventListener('change', (e) => {
        resumeFileName.innerText = e.target.files[0] ? "Selected: " + e.target.files[0].name : "";
    });
    jdFileInput.addEventListener('change', (e) => {
        jdFileName.innerText = e.target.files[0] ? "Selected: " + e.target.files[0].name : "";
    });

    analyzeBtn.addEventListener('click', async () => {
        errorBox.style.display = 'none';
        resultsDiv.style.display = 'none';
        loader.style.display = 'block';
        analyzeBtn.disabled = true;
        analyzeBtn.innerText = "Analyzing...";

        const formData = new FormData();
        formData.append('resume_text', document.getElementById('resumeText').value);
        formData.append('jd_text', document.getElementById('jdText').value);
        
        if(resumeFileInput.files[0]) formData.append('resume', resumeFileInput.files[0]);
        if(jdFileInput.files[0]) formData.append('jd', jdFileInput.files[0]);

        try {
            const response = await fetch('http://127.0.0.1:5000/analyze', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || "Something went wrong");
            }

            // Display the score
            const score = data.score;
            const scoreDisplay = document.getElementById('scoreDisplay');
            scoreDisplay.innerText = score;
            scoreDisplay.className = "score-num " + (score >= 70 ? "high" : score >= 40 ? "mid" : "low");

            // Display matched and missing tags
            document.getElementById('matchedTags').innerHTML = data.matched.map(s => `<span class="tag tag-green">${s}</span>`).join('');
            document.getElementById('missingTags').innerHTML = data.missing.map(s => `<span class="tag tag-red">${s}</span>`).join('');
            
            document.getElementById('explanationText').innerText = data.explanation;
            
            resultsDiv.style.display = 'block';

        } catch (err) {
            errorBox.innerText = err.message;
            errorBox.style.display = 'block';
        } finally {
            loader.style.display = 'none';
            analyzeBtn.disabled = false;
            analyzeBtn.innerText = "Analyze Match";
        }
    });
</script>

</body>
</html>
